controller_manager:
# Create main function
  ros__parameters:
    update_rate: 30

    # This was set only on the higher level
    use_sim_time: true

    # Differential drive controller
    diff_cont:
      type: diff_drive_controller/DiffDriveController

    # Similar to joint_state_publisher which publish tf and tf_static 
    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

# Create parameter of diff_cont
diff_cont:
  ros__parameters:

    # Publish transfrom at rate 50hz 
    # This value will be throttled by the controller_manager update rate. I set it higher so that it definitely "catches" each loop, but this is a bit misleading and should probably be set to match 
    publish_rate: 50.0

    base_frame_id: base_link

    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']
    # This was the value which sum of the distance 2 wheel from the center.
    wheel_separation: 0.35
    wheel_radius: 0.05

    use_stamped_vel: false

